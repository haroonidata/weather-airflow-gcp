services:
  airflow:
    image: apache/airflow:2.9.3
    container_name: weather_airflow
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__SECRET_KEY=weather_project_secret
      - GOOGLE_CLOUD_PROJECT=weather-ml-project-498711
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - ./data:/opt/airflow/data
      - ./logs:/opt/airflow/logs
      - C:/Users/Haroon/AppData/Roaming/gcloud:/home/airflow/.config/gcloud
    ports:
      - "8080:8080"
    command: >
      bash -c "airflow db init &&
               airflow users create --username admin --password admin --firstname Haroon --lastname Iqbal --role Admin --email admin@example.com &&
               airflow webserver & airflow scheduler"